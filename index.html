<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plants vs Zombies - Accurate Balance Edition</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #111; color: white; margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center; user-select: none;
        }
        h2 { margin: 5px; text-shadow: 2px 2px black; }
        #stage-selector { margin-bottom: 10px; display: flex; gap: 10px; }
        .stage-btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; background: #444; color: #fff; }
        .stage-btn.active { box-shadow: 0 0 10px #fff; }
        
        .DAY { background: #5cbe41 !important; }
        .NIGHT { background: #1a3a13 !important; }
        .POOL { background: #4caf50 !important; }
        .FOG { background: #2e5c32 !important; }
        .ROOF { background: #a15237 !important; }

        #game-container { position: relative; border: 5px solid #333; border-radius: 8px; overflow: hidden; }
        #grid {
            display: grid; grid-template-rows: repeat(6, 90px); grid-template-columns: repeat(9, 90px);
            background-image: linear-gradient(rgba(0,0,0,0.15) 2px, transparent 2px), linear-gradient(90deg, rgba(0,0,0,0.15) 2px, transparent 2px);
            background-size: 90px 90px;
        }
        .pool-row {
            background-color: #2196f3 !important;
            background-image: linear-gradient(rgba(0,0,0,0.15) 2px, transparent 2px), linear-gradient(90deg, rgba(0,0,0,0.15) 2px, transparent 2px) !important;
        }
        .cell { width: 90px; height: 90px; display: flex; justify-content: center; align-items: center; font-size: 2.2rem; cursor: pointer; position: relative; }
        .cell:hover { background-color: rgba(255,255,255,0.15); }
        #fog-overlay { position: absolute; top: 0; right: 0; width: 50%; height: 100%; background: rgba(100, 100, 100, 0.85); pointer-events: none; display: none; z-index: 20; backdrop-filter: blur(5px); }

        #hud { display: flex; gap: 10px; background: #222; padding: 10px; border-radius: 8px; margin-bottom: 10px; align-items: center; max-width: 810px; overflow-x: auto; }
        #sun-counter { font-size: 1.1rem; font-weight: bold; color: #ffeb3b; background: #333; padding: 10px; border-radius: 5px; }
        #wave-counter { font-size: 1.1rem; font-weight: bold; color: #ff5722; background: #333; padding: 10px; border-radius: 5px; margin-left: auto; }

        .seed-packet { background: #444; padding: 5px; border-radius: 5px; cursor: pointer; text-align: center; border: 2px solid transparent; min-width: 65px; position: relative; overflow: hidden; }
        .seed-packet.selected { border-color: #ffeb3b; background: #555; }
        .seed-packet .cost { font-size: 0.8rem; color: #ffeb3b; font-weight: bold; }
        
        /* Nakładka Cooldown na karcie */
        .cooldown-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); display: flex; justify-content: center;
            align-items: center; color: #fff; font-weight: bold; font-size: 1.2rem;
            pointer-events: none; transform: translateY(100%); transition: transform 0.1s linear;
        }

        .sun { position: absolute; width: 40px; height: 40px; background: #ffeb3b; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; cursor: pointer; box-shadow: 0 0 15px #ffeb3b; z-index: 30; }
        .zombie { position: absolute; width: 90px; height: 90px; display: flex; justify-content: center; align-items: center; font-size: 2.2rem; z-index: 10; }
        .bullet { position: absolute; width: 14px; height: 14px; border-radius: 50%; z-index: 12; }
        .container-item { position: absolute; bottom: 5px; right: 5px; font-size: 1rem; }
    </style>
</head>
<body>

    <h2>Plants vs Zombies - Real Cooldown & Wave Engine</h2>
    
    <div id="stage-selector">
        <button class="stage-btn active" onclick="changeStage('DAY', this)" style="background: #5cbe41;">Dzień</button>
        <button class="stage-btn" onclick="changeStage('NIGHT', this)" style="background: #1a3a13;">Noc</button>
        <button class="stage-btn" onclick="changeStage('POOL', this)" style="background: #2196f3;">Basen</button>
        <button class="stage-btn" onclick="changeStage('FOG', this)" style="background: #777;">Mgła</button>
        <button class="stage-btn" onclick="changeStage('ROOF', this)" style="background: #a15237;">Dach</button>
    </div>

    <div id="hud">
        <div id="sun-counter">☀️ <span id="sun-val">150</span></div>
        <div id="wave-counter">Fala: <span id="wave-val">0/10</span></div>
    </div>

    <div id="game-container">
        <div id="grid"></div>
        <div id="fog-overlay"></div>
    </div>

    <script>
        // --- SPECYFIKACJA CZASÓW ODNOWIENIA (COOLDOWNS) 1:1 ---
        // W oryginalnej grze: Fast = 7.5s, Slow = 30s, Very Slow = 50s.
        const CD_FAST = 7500;
        const CD_SLOW = 30000;
        const CD_VERY_SLOW = 50000;

        const plantTypes = {
            // --- KLASA DZIEŃ ---
            sunflower:   { name: 'Słonecznik', icon: '🌻', cost: 50,  hp: 300, action: 'sun', attackSpeed: 24000, cooldown: CD_FAST, water: false, land: true },
            peashooter:  { name: 'Groszek',    icon: '🫛', cost: 100, hp: 300, action: 'shoot', bulletColor: '#8bc34a', dmg: 20, attackSpeed: 1400, cooldown: CD_FAST, water: false, land: true },
            wallnut:     { name: 'Orzech',     icon: '🪨', cost: 50,  hp: 4000, action: 'none', cooldown: CD_SLOW, water: false, land: true },
            repeater:    { name: 'Repeater',   icon: '🔫', cost: 200, hp: 300, action: 'double-shoot', bulletColor: '#8bc34a', dmg: 20, attackSpeed: 1400, cooldown: CD_FAST, water: false, land: true },
            snowpea:     { name: 'Mroźny',     icon: '❄️', cost: 175, hp: 300, action: 'freeze-shoot', bulletColor: '#00bcd4', dmg: 20, attackSpeed: 1400, cooldown: CD_FAST, water: false, land: true },
            cherrybomb:  { name: 'Wiśnia',     icon: '🍒', cost: 150, hp: 100,  action: 'explode', cooldown: CD_VERY_SLOW, water: true, land: true },
            
            // --- KLASA NOC ---
            puffshroom:  { name: 'Puff',        icon: '🍄', cost: 0,   hp: 300, action: 'shoot', bulletColor: '#9c27b0', dmg: 20, attackSpeed: 1400, range: 4, cooldown: CD_FAST, water: false, land: true },
            sunshroom:   { name: 'Grzyb Sł.',  icon: '🟤', cost: 25,  hp: 300, action: 'sun-small', attackSpeed: 24000, cooldown: CD_FAST, water: false, land: true },
            fumeshroom:  { name: 'Fume',        icon: '🔮', cost: 75,  hp: 300, action: 'shoot', bulletColor: '#e040fb', dmg: 20, attackSpeed: 1400, cooldown: CD_FAST, water: false, land: true }, 
            hypnoshroom: { name: 'Hypno',       icon: '🌀', cost: 75,  hp: 300, action: 'hypno', cooldown: CD_SLOW, water: false, land: true },

            // --- KLASA BASEN / MGŁA ---
            lilypad:     { name: 'Lilia',       icon: '🪷', cost: 25,  hp: 300, action: 'none', cooldown: CD_FAST, water: true, land: false, isContainer: true },
            squash:      { name: 'Zgniatacz',   icon: '🎃', cost: 50,  hp: 300, action: 'squash', cooldown: CD_SLOW, water: true, land: true },
            tanglekelp:  { name: 'Wodorost',    icon: '🌿', cost: 25,  hp: 300, action: 'tangle', cooldown: CD_SLOW, water: true, land: false },
            plantern:    { name: 'Latarnia',    icon: '🏮', cost: 25,  hp: 300, action: 'clear-fog', cooldown: CD_SLOW, water: false, land: true },

            // --- KLASA DACH ---
            flowerpot:   { name: 'Doniczka',    icon: '🪴', cost: 25,  hp: 300, action: 'none', cooldown: CD_FAST, water: false, land: true, isContainer: true },
            cabbagepult: { name: 'Kapusta',     icon: '🥬', cost: 100, hp: 300, action: 'shoot', bulletColor: '#4caf50', dmg: 20, attackSpeed: 2000, cooldown: CD_FAST, water: false, land: true }
        };

        // --- ZOMBIE SPECYFIKACJA WAGI FALI (WAVE POINTS) ---
        const zombieTypes = {
            normal:    { name: 'Zwykły',     icon: '🧟', hp: 270,  speed: 0.25, points: 1 },
            cone:      { name: 'Stożek',     icon: '👷', hp: 640,  speed: 0.25, points: 2 },
            bucket:    { name: 'Wiaderko',   icon: '🪣', hp: 1370, speed: 0.25, points: 4 },
            flag:      { name: 'Flaga',      icon: '🚩', hp: 270,  speed: 0.4,  points: 1 },
            newspaper: { name: 'Gazeciarz',  icon: '📰', hp: 420,  speed: 0.25, points: 2 },
            diver:     { name: 'Nurek',      icon: '🤿', hp: 270,  speed: 0.25, points: 2, waterOnly: true }
        };

        // --- KONFIGURACJA POZIOMÓW ---
        let currentStage = 'DAY';
        const stageConfig = {
            DAY:   { rows: 5, hasPool: false, hasFog: false, needsRoofPot: false, skySun: true,  bg: 'DAY' },
            NIGHT: { rows: 5, hasPool: false, hasFog: false, needsRoofPot: false, skySun: false, bg: 'NIGHT' },
            POOL:  { rows: 6, hasPool: true,  hasFog: false, needsRoofPot: false, skySun: true,  bg: 'POOL' },
            FOG:   { rows: 6, hasPool: true,  hasFog: true,  needsRoofPot: false, skySun: false, bg: 'FOG' },
            ROOF:  { rows: 5, hasPool: false, hasFog: false, needsRoofPot: true,  skySun: true,  bg: 'ROOF' }
        };

        // Stan gry
        let sun = 150;
        let selectedPlant = null;
        let gridState = [];
        let zombies = [];
        let bullets = [];
        const cellSize = 90;

        // System Falowy (1:1 Czas pojawiania się)
        let currentWave = 0;
        const totalWaves = 10;
        let waveTimer = null;
        let nextWaveTimestamp = 0;

        // Stan odnowienia kart nasion (Cooldown tracking)
        let seedCooldowns = {};

        const gridElement = document.getElementById('grid');
        const sunValElement = document.getElementById('sun-val');
        const waveValElement = document.getElementById('wave-val');
        const container = document.getElementById('game-container');
        const fogOverlay = document.getElementById('fog-overlay');

        function changeStage(stageName, btnElement) {
            currentStage = stageName;
            document.querySelectorAll('.stage-btn').forEach(b => b.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');
            initLevel();
        }

        function initLevel() {
            const config = stageConfig[currentStage];
            gridElement.innerHTML = '';
            document.querySelectorAll('.zombie, .bullet, .sun').forEach(el => el.remove());
            zombies = []; bullets = []; currentWave = 0;
            
            gridElement.className = '';
            gridElement.style.gridTemplateRows = `repeat(${config.rows}, 90px)`;
            gridElement.classList.add(config.bg);

            gridState = Array(config.rows).fill(null).map(() => Array(9).fill(null).map(() => ({ plant: null, container: null })));

            for (let r = 0; r < config.rows; r++) {
                const isPoolRow = config.hasPool && (r === 2 || r === 3);
                for (let c = 0; c < 9; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    if (isPoolRow) cell.classList.add('pool-row');
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    cell.addEventListener('click', () => handleCellClick(r, c));
                    gridElement.appendChild(cell);
                }
            }

            fogOverlay.style.display = config.hasFog ? 'block' : 'none';
            buildHUD();
            updateSunUI();
            updateWaveUI();

            // Pierwszy zombie w oryginalnej grze pojawia się około 20-30 sekund od startu
            clearTimeout(waveTimer);
            nextWaveTimestamp = Date.now() + 25000; 
            waveTimer = setTimeout(triggerWave, 25000);
        }

        function buildHUD() {
            const hud = document.getElementById('hud');
            document.querySelectorAll('.seed-packet').forEach(p => p.remove());

            Object.keys(plantTypes).forEach(key => {
                const p = plantTypes[key];
                const packet = document.createElement('div');
                packet.classList.add('seed-packet');
                packet.id = `seed-${key}`;
                packet.onclick = () => selectPlant(key, packet);
                packet.innerHTML = `
                    <div>${p.icon}</div>
                    <div style="font-size:10px">${p.name}</div>
                    <div class="cost">${p.cost}</div>
                    <div class="cooldown-overlay" id="cd-${key}"></div>
                `;
                hud.appendChild(packet);
                seedCooldowns[key] = { active: false, expiresAt: 0 };
            });
        }

        function selectPlant(type, element) {
            if (sun < plantTypes[type].cost || seedCooldowns[type].active) return;
            document.querySelectorAll('.seed-packet').forEach(p => p.classList.remove('selected'));
            
            if (selectedPlant === type) {
                selectedPlant = null;
            } else {
                selectedPlant = type;
                element.classList.add('selected');
            }
        }

        function handleCellClick(r, c) {
            if (!selectedPlant) return;
            const config = stageConfig[currentStage];
            const typeData = plantTypes[selectedPlant];
            const slot = gridState[r][c];
            const isPoolCell = config.hasPool && (r === 2 || r === 3);

            if (sun < typeData.cost || seedCooldowns[selectedPlant].active) return;

            if (isPoolCell && !typeData.water && !slot.container) return;
            if (!isPoolCell && !typeData.water && typeData.land === false) return;
            if (config.needsRoofPot && !typeData.pot && !slot.container && typeData.isContainer !== true) return;

            if (typeData.isContainer) {
                if (slot.container) return;
                slot.container = { type: selectedPlant, icon: typeData.icon };
                renderCell(r, c);
            } else {
                if (slot.plant) return;
                slot.plant = {
                    type: selectedPlant, hp: typeData.hp, maxHp: typeData.hp,
                    lastAction: Date.now() - (typeData.attackSpeed ? typeData.attackSpeed - 500 : 0), // drobne przesunięcie startowe akcji
                    icon: typeData.icon
                };
                renderCell(r, c);
            }

            // Aktywacja Cooldownu 1:1
            startSeedCooldown(selectedPlant, typeData.cooldown);

            sun -= typeData.cost;
            selectedPlant = null;
            document.querySelectorAll('.seed-packet').forEach(p => p.classList.remove('selected'));
            updateSunUI();
            checkFogClearance();
        }

        function startSeedCooldown(type, duration) {
            seedCooldowns[type].active = true;
            seedCooldowns[type].expiresAt = Date.now() + duration;
            
            const overlay = document.getElementById(`cd-${type}`);
            overlay.style.transform = 'translateY(0%)';

            let interval = setInterval(() => {
                let remaining = seedCooldowns[type].expiresAt - Date.now();
                if (remaining <= 0) {
                    clearInterval(interval);
                    seedCooldowns[type].active = false;
                    overlay.style.transform = 'translateY(100%)';
                    overlay.innerText = '';
                } else {
                    overlay.innerText = Math.ceil(remaining / 1000) + 's';
                }
            }, 100);
        }

        function renderCell(r, c) {
            const cell = document.querySelector(`[data-row='${r}'][data-col='${c}']`);
            cell.innerHTML = ''; const slot = gridState[r][c];
            if (slot.container) {
                cell.innerText = slot.container.icon;
                if (slot.plant) {
                    const sub = document.createElement('div'); sub.innerText = slot.plant.icon;
                    sub.classList.add('container-item'); cell.appendChild(sub);
                }
            } else if (slot.plant) { cell.innerText = slot.plant.icon; }
        }

        function checkFogClearance() {
            if (!stageConfig[currentStage].hasFog) return;
            let hasPlantern = false;
            for(let r=0; r<gridState.length; r++)
                for(let c=0; c<9; c++)
                    if(gridState[r][c].plant && gridState[r][c].plant.type === 'plantern') hasPlantern = true;
            fogOverlay.style.width = hasPlantern ? '15%' : '50%';
        }

        // --- AUTENTYCZNY SYSTEM FALOWY (WAVE SYSTEM) 1:1 ---
        function updateWaveUI() {
            waveValElement.innerText = `${currentWave}/${totalWaves}`;
        }

        function triggerWave() {
            currentWave++;
            updateWaveUI();

            const config = stageConfig[currentStage];
            
            // Obliczanie budżetu punktowego fali (im wyższa fala, tym silniejsze jednostki)
            // Wykładniczy wzrost trudności wzorowany na PvZ
            let waveBudget = currentWave * 2; 
            if (currentWave === totalWaves) waveBudget *= 2.5; // Final Wave!

            let isHugeWave = (currentWave === 5 || currentWave === totalWaves);
            if (isHugeWave) {
                alert(currentWave === totalWaves ? "🚨 OSTATNIA FALA NADCHODZI! 🚨" : "🚨 spora fala zombie nadchodzi! 🚨");
            }

            // Spawnuj zombie dopóki budżet punktowy fali nie zostanie wyczerpany
            while (waveBudget > 0) {
                const randomRow = Math.floor(Math.random() * config.rows);
                const isPoolRow = config.hasPool && (randomRow === 2 || randomRow === 3);
                
                let validKeys = Object.keys(zombieTypes).filter(k => {
                    let z = zombieTypes[k];
                    if (z.waterOnly && !isPoolRow) return false;
                    return z.points <= waveBudget;
                });

                if (validKeys.length === 0) break;
                const chosenKey = validKeys[Math.floor(Math.random() * validKeys.length)];
                const proto = zombieTypes[chosenKey];

                spawnZombieElement(proto, randomRow);
                waveBudget -= proto.points;
            }

            // Ustalamy czas do następnej fali: 
            // W PvZ normalna fala trwa około 30-40 sekund lub następuje szybciej, jeśli gracz zabije wszystkich zombie.
            if (currentWave < totalWaves) {
                let nextDelay = isHugeWave ? 45000 : 35000; 
                nextWaveTimestamp = Date.now() + nextDelay;
                waveTimer = setTimeout(triggerWave, nextDelay);
            }
        }

        function spawnZombieElement(proto, row) {
            const zDiv = document.createElement('div');
            zDiv.classList.add('zombie');
            zDiv.innerText = proto.icon;
            zDiv.style.left = (9 * cellSize) + 'px';
            zDiv.style.top = (row * cellSize) + 'px';
            
            container.appendChild(zDiv);
            zombies.push({
                element: zDiv, row: row, x: 9 * cellSize,
                hp: proto.hp, maxHp: proto.hp, speed: proto.speed,
                proto: proto, isHypnotized: false
            });
        }

        function spawnSun(x = null, y = null) {
            const sunDiv = document.createElement('div');
            sunDiv.classList.add('sun'); sunDiv.innerText = '☀️';
            const posX = x !== null ? x : Math.random() * (9 * cellSize - 40);
            const posY = y !== null ? y : Math.random() * (stageConfig[currentStage].rows * cellSize - 40);
            sunDiv.style.left = posX + 'px'; sunDiv.style.top = posY + 'px';
            
            sunDiv.onclick = (e) => {
                e.stopPropagation(); sun += 25; updateSunUI(); sunDiv.remove();
            };
            container.appendChild(sunDiv);
            setTimeout(() => { if(sunDiv) sunDiv.remove(); }, 10000); // Słońce leży 10 sekund
        }

        // --- SILNIK - DETEKCJA KOLIZJI I AKCJI (60 FPS) ---
        function gameLoop() {
            const now = Date.now();
            const config = stageConfig[currentStage];

            // Przyśpieszenie fali: Jeśli na planszy nie ma zombie, a do kolejnej fali zostało sporo czasu, skróć go!
            if (zombies.length === 0 && nextWaveTimestamp - now > 5000 && currentWave < totalWaves) {
                clearTimeout(waveTimer);
                nextWaveTimestamp = now + 4000;
                waveTimer = setTimeout(triggerWave, 4000);
            }

            // 1. Pociski
            bullets.forEach((bullet, bIdx) => {
                bullet.x += bullet.speed;
                bullet.element.style.left = bullet.x + 'px';

                zombies.forEach((zombie, zIdx) => {
                    if (!zombie.isHypnotized && zombie.row === bullet.row && Math.abs(zombie.x - bullet.x) < 25) {
                        zombie.hp -= bullet.dmg;
                        if (bullet.effect === 'freeze') {
                            zombie.speed = zombie.proto.speed * 0.5;
                            zombie.element.style.filter = 'hue-rotate(90deg) saturate(1.5)'; // Efekt zamrożenia
                        }
                        bullet.element.remove();
                        bullets.splice(bIdx, 1);
                        
                        if (zombie.hp <= 0) {
                            zombie.element.remove();
                            zombies.splice(zIdx, 1);
                            // Sprawdzenie wygranej gry
                            if (currentWave === totalWaves && zombies.length === 0) {
                                alert("🏆 POZIOM UKOŃCZONY! Wygrałeś! 🏆");
                                initLevel();
                            }
                        }
                    }
                });

                if (bullet.x > 9 * cellSize) {
                    bullet.element.remove();
                    bullets.splice(bIdx, 1);
                }
            });

            // 2. Logika Zombie (Jedzenie z prędkością 1:1)
            zombies.forEach((zombie, zIdx) => {
                let currentCol = Math.floor((zombie.x + 35) / cellSize);
                let slot = (currentCol >= 0 && currentCol < 9) ? gridState[zombie.row][currentCol] : null;

                if (zombie.isHypnotized) {
                    zombie.x += zombie.speed;
                    zombie.element.style.left = zombie.x + 'px';
                    zombies.forEach((other) => {
                        if (!other.isHypnotized && other.row === zombie.row && Math.abs(other.x - zombie.x) < 30) {
                            other.hp -= 2; zombie.hp -= 2;
                        }
                    });
                    if (zombie.x > 9 * cellSize || zombie.hp <= 0) { zombie.element.remove(); zombies.splice(zIdx, 1); }
                } else {
                    if (slot && slot.plant) {
                        if (slot.plant.type === 'hypnoshroom') {
                            zombie.isHypnotized = true;
                            zombie.element.style.transform = 'scaleX(-1)';
                            slot.plant = null; renderCell(zombie.row, currentCol); return;
                        }
                        if (slot.plant.type === 'tanglekelp') {
                            slot.plant = null; renderCell(zombie.row, currentCol);
                            zombie.element.remove(); zombies.splice(zIdx, 1); return;
                        }

                        // Prędkość gryzienia: Zombie w PvZ zadaje obrażenia co ok. 0.5 sekundy
                        slot.plant.hp -= 1.5; 
                        
                        if (zombie.proto.type === 'newspaper' && zombie.hp < zombie.maxHp / 2) {
                            zombie.speed = zombie.proto.speed * 2; // Szał gazeciarza
                        }

                        if (slot.plant.hp <= 0) {
                            slot.plant = null;
                            renderCell(zombie.row, currentCol);
                            checkFogClearance();
                        }
                    } else if (slot && slot.container && !slot.plant) {
                        slot.container = null; renderCell(zombie.row, currentCol);
                    } else {
                        zombie.x -= zombie.speed;
                        zombie.element.style.left = zombie.x + 'px';
                    }

                    if (zombie.x < -40) {
                        alert("Zgniłeś! Zombie weszli do domu! 🧠");
                        initLevel();
                    }
                }
            });

            // 3. Logika Roślin
            for (let r = 0; r < config.rows; r++) {
                for (let c = 0; c < 9; c++) {
                    const slot = gridState[r][c];
                    if (!slot || !slot.plant) continue;
                    const plant = slot.plant;
                    const pType = plantTypes[plant.type];

                    if (now - plant.lastAction > pType.attackSpeed) {
                        if (pType.action === 'sun') spawnSun(c * cellSize + 25, r * cellSize + 25);
                        if (pType.action === 'sun-small') spawnSun(c * cellSize + 25, r * cellSize + 25);
                        
                        if (['shoot', 'double-shoot', 'freeze-shoot'].includes(pType.action)) {
                            const hasTarget = zombies.some(z => z.row === r && z.x > c * cellSize && !z.isHypnotized);
                            const inRange = pType.range ? zombies.some(z => z.row === r && (z.x - c*cellSize) < pType.range * cellSize) : true;

                            if (hasTarget && inRange) {
                                const shots = pType.action === 'double-shoot' ? 2 : 1;
                                for(let i=0; i<shots; i++) {
                                    setTimeout(() => {
                                        const bDiv = document.createElement('div');
                                        bDiv.classList.add('bullet');
                                        bDiv.style.backgroundColor = pType.bulletColor;
                                        bDiv.style.left = (c * cellSize + 60 + (i*15)) + 'px';
                                        bDiv.style.top = (r * cellSize + 35) + 'px';
                                        container.appendChild(bDiv);
                                        bullets.push({
                                            element: bDiv, row: r, x: c * cellSize + 60 + (i*15),
                                            speed: 5, dmg: pType.dmg, effect: pType.action === 'freeze-shoot' ? 'freeze' : 'none'
                                        });
                                    }, i * 200);
                                }
                            }
                        }
                        plant.lastAction = now;
                    }

                    // Logika natychmiastowa dla eksplozji / squash
                    if (pType.action === 'explode') {
                        zombies.forEach(z => {
                            if (Math.abs(z.row - r) <= 1 && Math.abs(Math.floor(z.x/cellSize) - c) <= 1) z.hp = 0;
                        });
                        slot.plant = null; renderCell(r, c);
                    }
                }
            }

            requestAnimationFrame(gameLoop);
        }

        // Naturalne słońce z nieba spada co ok. 10 sekund w ciągu dnia
        setInterval(() => { if (stageConfig[currentStage].skySun) spawnSun(); }, 10000);

        initLevel();
        gameLoop();
    </script>
</body>
</html>
